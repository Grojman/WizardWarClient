<div class="gallery-container">

  <!-- HEADER -->

  <div class="gallery-header">

    <h1 class="title glow">

      <i class="fa-solid fa-book-sparkles title-icon"></i>

      Galería de Cartas

    </h1>

    <h2 class="subtitle">

      <i class="fa-solid fa-scroll"></i>

      Explora todas las cartas y descubre sus poderes

    </h2>

    <a
      routerLink="/"
      class="back-button"
    >

      <i class="fa-solid fa-arrow-left"></i>

      Volver a inicio

    </a>

  </div>



  <!-- GRID DE CARTAS -->

  <div class="cards-container">

    <app-cardvisualizer
      *ngFor="let card of cards"
      [card]="card"
      class="card-item"
    >
    </app-cardvisualizer>

  </div>

</div>
