<div class="game-layout">
  <app-player
    *ngFor="let player of this.gameState.Rivals"
    [player]="player"
    [visibleHand]="false"
    [isAnimating]="isAnimating"
    [showHealthAsTarget]="this.attackingUnit !== null"
    (onCardRightClick)="onRightClick($event.event, $event.card)"
    (onDockSelected)="rivalBoardCardSelected(player, player.Board[$event])"
    (onPlayerTargetSelected)="rivalTargetSelected(player)"
  >

  </app-player>

  <app-player
    [player]="this.gameState.Me"
    [visibleHand]="true"
    [isAnimating]="isAnimating"
    [showHealthAsTarget]="this.attackingUnit !== null"
    (onDeckSelected)="deckSelected()"
    (onCardRightClick)="onRightClick($event.event, $event.card)"
    (onDockSelected)="dockSelected($event)"
    (onAttackingUnitSelected)="attackingUnitSelected($event)"
    (onLastSpellClicked)="lastSpellClicked()"
    (onCardSelected)="cardSelected($event)"
  >

  </app-player>

  <div
    class="side-panel"
    [class.open]="showSidePanel"
  >

  <app-cardvisualizer
  [card]="selectedCardInfo"
  *ngIf="selectedCardInfo">
</app-cardvisualizer>
  </div>


  <button
    [class.open]="showSidePanel"
    class="toggle-panel"
    (click)="togglePanel()"
    >
<i class="fa-solid fa-arrow-right-long"></i>
  </button>

  <div class="animation-layer">
    <div class="proyectile" style="display: none;">

    </div>

    <ng-container
  *ngFor="let msg of floatingMessages; let i = index"
    >

      <div
        class="speech-bubble"
        [style.left.px]="msg.x"
        [style.bottom.px]="msg.bottom"
        [style.--float-height.px]="msg.height"
        [style.animation-duration.ms]="msg.duration"
        [style.transform]="'translateX(-50%) translateY(' + (-i * 30) + 'px)'"
      >
        <img
          *ngIf="isReaction(msg.text)"
          [src]="getReactionPath(msg.text)"
          class="reaction-image"
          alt="reaction"
        />
        <span *ngIf="!isReaction(msg.text)">

          {{ msg.text }}

        </span>

      </div>

    </ng-container>
  </div>
</div>

<app-message-dialog
  #dialog
  (messageSent)="onMessageSent($event)"
></app-message-dialog>
