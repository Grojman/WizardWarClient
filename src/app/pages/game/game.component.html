<div class="game-layout">


  <div class="board-column">

    <div class="enemy-hand">

      <app-card
        *ngFor="let card of [].constructor(gameState.Rival.HandSize)"
      />
    </div>

    <div class="enemy-board">

      <div class="player-info">
          <app-health 
      [health]="rivalHealth"
      (click)="rivalTargetSelected()"
      [rival]="true"
      [myTurn]="!gameState.IsMyTurn"
      [attr.data-game-id]="gameState.Rival.Id"
      [enhanced]="attackingUnit !== null"
      ></app-health>

      <p class="player-name">
        {{ gameState.Rival.Name }}
      </p>
      </div>

      

      <div class="board-row">

        <app-dock
          *ngFor="let card of gameState.Rival.Board"
          [card]="card"
          (contextmenu)="onRightClick($event, card)"
          (click)="rivalBoardCardSelected(card)"
          [enhanced]="attackingUnit !== null && card !== null"
          [rival]="true"
        />

        <hr class="separator">

        <app-dock
          [card]="rivalLastSpellPlayed"
          (contextmenu)="onRightClick($event, rivalLastSpellPlayed)"
          [rival]="true"
        ></app-dock>

      </div>


      <app-deck
       class="enemy-deck" 
       [small]="true" 
       [deck]="storedGameState.Rival.Deck"
       [attr.data-game-id]="'rival-deck'">

      </app-deck>

    </div>

    <div class="player-board">

      <div class="player-info">
        <app-health 
        [myTurn]="gameState.IsMyTurn"
        [health]="userHealth"
        [attr.data-game-id]="gameState.Me.Id"
        (click)="playerTargetSelected()"
        [enhanced]="attackingUnit !== null"
        ></app-health>

        <p class="player-name">
        {{ gameState.Me.Name }}
      </p>
      </div>

      

      <div class="board-row">

        <app-dock
          *ngFor="let card of gameState.Me.Board; index as i"
          [card]="card"
          [enhanced]="(unitSelected && card === null) || (card !== null && attackingUnit !== null && card.id !== attackingUnit.id)"
          [isAttackingCard]="card !== null && card.id === attackingUnit?.id"
          (contextmenu)="onRightClick($event, card)"
          (click)="dockSelected(i)"
          (onCardClick)="attackingUnitSelected(card)"
          [rival]="false"
        />

        <hr class="separator">

        <app-dock
        [card]="playerLastSpellPlayed"
        (contextmenu)="onRightClick($event, playerLastSpellPlayed)"
        [rival]="false"
        >
        </app-dock>

      </div>

      <app-deck 
      class="player-deck" 
      [small]="true"
      [deck]="storedGameState.Me.Deck"
      [attr.data-game-id]="'player-deck'"
      (click)="deckSelected()"
      ></app-deck>

    </div>

    <div class="player-hand">

      <app-card
        *ngFor="let card of gameState.Me.HandData; let i = index"
        [card]="card"
        (click)="cardSelected(card)"
        [selected]="card.id === selectedCard?.id"
        (contextmenu)="onRightClick($event, card)"
        [canBeSelected]="true"
        
      />

    </div>

  </div>


  <div
    class="side-panel"
    [class.open]="showSidePanel"
  >

  <app-cardvisualizer
  [card]="selectedCardInfo"
  *ngIf="selectedCardInfo">
</app-cardvisualizer>
  </div>


  <button
    class="toggle-panel"
    (click)="togglePanel()"
  >
    ☰
  </button>

  <div class="animation-layer">
    <div class="proyectile" style="display: none;">

    </div>
  </div>

</div>
