<div
  [ngClass]="[
    rival ? 'rival-health-background' : 'player-health-background'
  ]"
>

<span
    class="life-text title"
[class.enhanced]="enhanced"
    [ngClass]="{
      'health-animate-exit': health.animationState === 'exit',
      'health-animate-enter': health.animationState === 'enter',
      'negative': health.negative,
      'positive' : health.positive
    }"
  >
    {{ health.displayHealth }}
  </span>

</div>
