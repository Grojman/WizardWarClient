<!-- settings.component.html -->

<div class="settings-container" *ngIf="isOpen">
  <div class="settings-panel">
    <div class="settings-header">
      <span class="title">Settings</span>

      <button class="close-btn" type="button" (click)="close()">
        ✕
      </button>
    </div>
    
    <div class="settings-content">

      <!-- Animation Speed -->
      <div class="setting-group">
        <label class="setting-label">Animation Speed</label>
        <p class="current-speed">Current: {{ getCurrentSpeedLabel() }}</p>

        <div class="speed-options">
          <button
            *ngFor="let option of speedOptions"
            class="speed-btn"
            [class.active]="option.value === currentSpeedMultiplier"
            (click)="changeSpeed(option.value)"
            [title]="option.description"
          >
            {{ option.label }}
          </button>
        </div>
      </div>

      <!-- Music -->
      <div class="setting-group">
        <label class="setting-label">Music</label>

        <label class="checkbox-label">
          <input
            type="checkbox"
            [checked]="musicEnabled"
            (change)="setMusicEnabled($any($event.target).checked)"
          />
          Enabled
        </label>

        <input
          type="range"
          min="0"
          max="1"
          step="0.01"
          [value]="musicVolume"
          (input)="setMusicVolume(+$any($event.target).value)"
        />

        <span>{{ (musicVolume * 100) | number:'1.0-0' }}%</span>
      </div>

      <!-- Sound Effects -->
      <div class="setting-group">
        <label class="setting-label">Sound Effects</label>

        <label class="checkbox-label">
          <input
            type="checkbox"
            [checked]="sfxEnabled"
            (change)="setSfxEnabled($any($event.target).checked)"
          />
          Enabled
        </label>

        <input
          type="range"
          min="0"
          max="1"
          step="0.01"
          [value]="sfxVolume"
          (input)="setSfxVolume(+$any($event.target).value)"
        />

        <span>{{ (sfxVolume * 100) | number:'1.0-0' }}%</span>
      </div>

    </div>
  </div>
</div>
