<div class="container"
>
<app-card
[class.large]="large"
        [card]="card"
        [canBeSelected]="false"
    >
    </app-card>

    <div class="card-info"
    >
        <p>
            {{ card.type }}
        </p>

        <hr>

        <p
        class="card-families"
        *ngIf="card.families?.length !== 0"
        >
            {{ card.families?.join(" / ") }}
        </p>

        <hr *ngIf="card.families?.length !== 0">

        <p
        *ngIf="card.description"
        class="card-description"
        >
            {{ card.description }}
        </p>
    </div>
</div>
