<div class="dock" 
    [class.enhanced]="enhanced"
    
    [ngClass]="{
        'rival-background': rival,
        'player-background': !rival,
        'spell-background': spell,
    }"
    >
    <app-card
    [attacking]="isAttackingCard"
    [target]="isTarget && rival"
        *ngIf="card"
        [card]="card"
        (click)="cardClicked()"
        class="contained-card"

    />
</div>
